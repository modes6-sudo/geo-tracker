name: Update index.html from URL
on:
  workflow_dispatch:
jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Download updated index.html
        run: curl -L -o index.html https://files.catbox.moe/lp0lmt.html
      - name: Verify download
        run: |
          wc -c index.html
          grep -c "tab-social" index.html
      - name: Commit and push
        run: |
          git config user.email "modes6@gmail.com"
          git config user.name "modes6-sudo"
          git add index.html
          git diff --staged --stat
          git commit -m "Add X/Social Feed tab \u2014 Twitter/PSYOPS analysis + Day 4 overnight intel"
          git push
