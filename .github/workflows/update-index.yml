name: Update index.html from URL
on:
  push:
    branches:
      - main
    paths:
      - 'REQUEST_UPDATE'
  workflow_dispatch:
jobs:
  update:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Download updated index.html
        run: curl -fL -o index.html https://files.catbox.moe/lp0lmt.html
      - name: Verify download
        run: |
          echo "File size: $(wc -c < index.html) bytes"
          grep -c 'tab-social' index.html && echo 'Social tab confirmed' || echo 'WARNING: social tab not found'
      - name: Commit and push
        run: |
          git config user.email "modes6@gmail.com"
          git config user.name "modes6-sudo"
          git add index.html
          if git diff --staged --quiet; then
            echo 'No changes to commit'
          else
            git commit -m 'Add X/Social Feed tab \u2014 Twitter/PSYOPS analysis + Day 4 overnight intel'
            git push origin main
          fi
